<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Sri Sai Poojitha Palepu â€” Backend Engineer &amp; AI/ML Researcher</title>
<meta name="description" content="Portfolio of Sri Sai Poojitha Palepu â€” MCA graduate specializing in backend engineering, AI/ML signal processing, and cybersecurity. Published researcher, GCCMIEA-2025." />
<meta name="theme-color" content="#0B0D12" />

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">

<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>

<style>
  :root {
    --ink: #0B0D12;
    --surface: #12151C;
    --surface-2: #171B24;
    --line: #262B36;
    --text: #ECEDEF;
    --text-dim: #9BA1AE;
    --amber: #F2A93B;
    --teal: #2FBEA6;
    --coral: #E8654F;
    --radius: 14px;
    --wrap: 1080px;
  }
  [data-theme="light"] {
    --ink: #F6F5F1;
    --surface: #FFFFFF;
    --surface-2: #FBFAF7;
    --line: #E4E0D6;
    --text: #14161B;
    --text-dim: #6B6F78;
    --amber: #C97A17;
    --teal: #16866F;
    --coral: #C94A36;
  }

  * { box-sizing: border-box; }
  html { scroll-behavior: smooth; }
  body {
    margin: 0;
    background: var(--ink);
    color: var(--text);
    font-family: 'IBM Plex Sans', sans-serif;
    -webkit-font-smoothing: antialiased;
    transition: background .4s ease, color .4s ease;
    overflow-x: hidden;
  }
  h1, h2, h3, .display {
    font-family: 'Space Grotesk', sans-serif;
    letter-spacing: -0.02em;
    margin: 0;
  }
  .mono {
    font-family: 'IBM Plex Mono', monospace;
  }
  a { color: inherit; text-decoration: none; }
  img { max-width: 100%; display: block; }
  ::selection { background: var(--amber); color: #0B0D12; }

  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after { animation-duration: 0.001ms !important; transition-duration: 0.001ms !important; }
  }

  /* Focus visibility */
  a:focus-visible, button:focus-visible {
    outline: 2px solid var(--amber);
    outline-offset: 3px;
  }

  /* Scroll progress */
  .progress-bar {
    position: fixed; top: 0; left: 0; height: 3px;
    background: linear-gradient(90deg, var(--teal), var(--amber));
    z-index: 999; transition: width .1s linear;
  }

  /* cursor glow */
  .cursor-glow {
    position: fixed; width: 380px; height: 380px; border-radius: 50%;
    pointer-events: none; z-index: 1;
    background: radial-gradient(circle, rgba(242,169,59,0.10) 0%, rgba(242,169,59,0) 70%);
    transform: translate(-50%, -50%);
    transition: opacity .3s ease;
    z-index: 2;
  }
  @media (max-width: 780px) { .cursor-glow { display: none; } }

  .wrap { max-width: var(--wrap); margin: 0 auto; padding: 0 28px; }

  /* Nav */
  nav {
    position: sticky; top: 0; z-index: 50;
    backdrop-filter: blur(14px);
    background: color-mix(in srgb, var(--ink) 78%, transparent);
    border-bottom: 1px solid var(--line);
  }
  .nav-inner {
    max-width: var(--wrap); margin: 0 auto; padding: 16px 28px;
    display: flex; align-items: center; justify-content: space-between;
  }
  .nav-mark { font-weight: 600; font-size: 15px; }
  .nav-mark span { color: var(--amber); }
  .nav-links { display: flex; gap: 26px; align-items: center; }
  .nav-links a {
    font-family: 'IBM Plex Mono', monospace; font-size: 12.5px;
    color: var(--text-dim); position: relative; padding: 4px 0;
  }
  .nav-links a.active { color: var(--text); }
  .nav-links a.active::after {
    content: ''; position: absolute; left: 0; bottom: -2px; width: 100%; height: 1.5px;
    background: var(--amber);
  }
  @media (max-width: 720px) { .nav-links a:not(.theme-toggle) { display: none; } }

  .theme-toggle {
    border: 1px solid var(--line); background: var(--surface); color: var(--text);
    padding: 7px 12px; border-radius: 999px; font-family: 'IBM Plex Mono', monospace;
    font-size: 11.5px; cursor: pointer; display: flex; align-items: center; gap: 6px;
  }

  /* Buttons */
  .btn {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 13px 24px; border-radius: 999px; font-weight: 500; font-size: 14.5px;
    cursor: pointer; border: 1px solid transparent; transition: transform .15s ease;
    font-family: 'IBM Plex Sans', sans-serif;
  }
  .btn-primary { background: var(--amber); color: #14110A; }
  .btn-ghost { border-color: var(--line); color: var(--text); background: transparent; }

  /* Sections generic */
  section { position: relative; padding: 120px 0; }
  @media (max-width: 720px) { section { padding: 80px 0; } }
  .eyebrow {
    font-family: 'IBM Plex Mono', monospace; font-size: 12.5px; color: var(--teal);
    display: flex; align-items: center; gap: 10px; margin-bottom: 18px;
  }
  .eyebrow::before { content: '//'; color: var(--text-dim); }
  .section-title { font-size: clamp(28px, 4vw, 40px); font-weight: 600; margin-bottom: 14px; }
  .section-sub { color: var(--text-dim); max-width: 560px; font-size: 15.5px; line-height: 1.6; }

  .reveal { opacity: 0; transform: translateY(28px); transition: opacity .7s ease, transform .7s ease; }
  .reveal.in-view { opacity: 1; transform: translateY(0); }

  /* HERO */
  .hero {
    min-height: 92vh; display: flex; flex-direction: column; justify-content: center;
    padding-top: 60px; position: relative; overflow: hidden;
  }
  .hero-tag {
    font-family: 'IBM Plex Mono', monospace; font-size: 13px; color: var(--text-dim);
    border: 1px solid var(--line); display: inline-flex; padding: 6px 14px; border-radius: 999px;
    margin-bottom: 28px; gap: 8px; align-items: center;
  }
  .hero-tag .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--teal); animation: blink 2s infinite; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.3} }
  .hero h1 {
    font-size: clamp(38px, 6.4vw, 74px); line-height: 1.03; font-weight: 700; max-width: 920px;
  }
  .hero h1 .accent { color: var(--amber); }
  .hero-statement {
    margin-top: 26px; max-width: 620px; font-size: 17px; line-height: 1.7; color: var(--text-dim);
  }
  .hero-cta { margin-top: 40px; display: flex; gap: 16px; flex-wrap: wrap; }
  .hero-meta {
    margin-top: 64px; display: flex; gap: 34px; flex-wrap: wrap;
    font-family: 'IBM Plex Mono', monospace; font-size: 12.5px; color: var(--text-dim);
  }
  .hero-meta b { color: var(--text); font-weight: 500; }

  .waveform-wrap { position: absolute; left: 0; right: 0; bottom: 0; height: 160px; opacity: .8; pointer-events:none; }
  .waveform-wrap svg { width: 100%; height: 100%; }
  .wave-path {
    fill: none; stroke: var(--teal); stroke-width: 1.6; stroke-linecap: round;
    stroke-dasharray: 6 10; animation: dash 5s linear infinite;
  }
  .wave-path.amber { stroke: var(--amber); stroke-width: 1.2; animation-duration: 7s; opacity: .6; }
  @keyframes dash { to { stroke-dashoffset: -320; } }

  /* JOURNEY TIMELINE */
  .timeline { position: relative; margin-top: 60px; padding-left: 26px; border-left: 1px solid var(--line); }
  .tl-item { position: relative; padding-bottom: 46px; padding-left: 30px; }
  .tl-item:last-child { padding-bottom: 0; }
  .tl-item::before {
    content: ''; position: absolute; left: -35.5px; top: 4px; width: 11px; height: 11px;
    border-radius: 50%; background: var(--ink); border: 2px solid var(--amber);
  }
  .tl-path { font-family: 'IBM Plex Mono', monospace; font-size: 11.5px; color: var(--teal); margin-bottom: 6px; }
  .tl-title { font-size: 18px; font-weight: 600; margin-bottom: 4px; }
  .tl-org { color: var(--text-dim); font-size: 14px; margin-bottom: 8px; }
  .tl-meta { font-family: 'IBM Plex Mono', monospace; font-size: 12px; color: var(--text-dim); }

  /* DASHBOARD stats */
  .stats-grid {
    display: grid; grid-template-columns: repeat(4, 1fr); gap: 1px;
    background: var(--line); border: 1px solid var(--line); border-radius: var(--radius);
    overflow: hidden; margin-top: 50px;
  }
  @media (max-width: 780px) { .stats-grid { grid-template-columns: repeat(2, 1fr); } }
  .stat-cell { background: var(--surface); padding: 32px 24px; }
  .stat-num { font-family: 'Space Grotesk', sans-serif; font-size: 38px; font-weight: 700; color: var(--amber); }
  .stat-label { font-family: 'IBM Plex Mono', monospace; font-size: 12px; color: var(--text-dim); margin-top: 8px; }

  /* EXPERTISE */
  .expertise-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-top: 50px; }
  @media (max-width: 900px) { .expertise-grid { grid-template-columns: 1fr; } }
  .expertise-card {
    background: var(--surface); border: 1px solid var(--line); border-radius: var(--radius);
    padding: 30px; transition: transform .3s ease, border-color .3s ease;
  }
  .expertise-card:hover { transform: translateY(-4px); border-color: var(--teal); }
  .expertise-icon { width: 38px; height: 38px; margin-bottom: 20px; }
  .expertise-card h3 { font-size: 19px; margin-bottom: 10px; }
  .expertise-card p { color: var(--text-dim); font-size: 13.8px; line-height: 1.6; margin-bottom: 20px; }
  .pill-row { display: flex; flex-wrap: wrap; gap: 8px; }
  .pill {
    font-family: 'IBM Plex Mono', monospace; font-size: 11.5px; padding: 5px 11px;
    border-radius: 6px; background: var(--surface-2); border: 1px solid var(--line); color: var(--text-dim);
  }

  /* EXPERIENCE */
  .exp-card {
    display: grid; grid-template-columns: 220px 1fr; gap: 40px;
    background: var(--surface); border: 1px solid var(--line); border-radius: var(--radius);
    padding: 40px; margin-top: 50px;
  }
  @media (max-width: 720px) { .exp-card { grid-template-columns: 1fr; gap: 20px; } }
  .exp-side .exp-role { font-size: 21px; font-weight: 600; margin-bottom: 6px; }
  .exp-side .exp-org { color: var(--teal); font-size: 14px; margin-bottom: 14px; }
  .exp-side .exp-dates { font-family: 'IBM Plex Mono', monospace; font-size: 12px; color: var(--text-dim); }
  .exp-list { list-style: none; margin: 0; padding: 0; display: flex; flex-direction: column; gap: 14px; }
  .exp-list li { padding-left: 22px; position: relative; font-size: 15px; line-height: 1.6; color: var(--text); }
  .exp-list li::before { content: 'â–¸'; position: absolute; left: 0; color: var(--amber); }

  /* PROJECTS */
  .projects-grid { display: grid; grid-template-columns: 1fr; gap: 22px; margin-top: 50px; }
  .project-card {
    background: var(--surface); border: 1px solid var(--line); border-radius: var(--radius);
    padding: 34px; display: grid; grid-template-columns: 1fr auto; gap: 24px; align-items: start;
    transition: border-color .3s ease;
  }
  .project-card:hover { border-color: var(--amber); }
  .project-card.featured { border-color: var(--teal); background: linear-gradient(155deg, var(--surface), var(--surface-2)); }
  @media (max-width: 720px) { .project-card { grid-template-columns: 1fr; } }
  .project-tag {
    font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: var(--teal);
    border: 1px solid var(--teal); border-radius: 999px; padding: 4px 10px; display: inline-block; margin-bottom: 14px;
  }
  .project-card h3 { font-size: 21px; margin-bottom: 10px; }
  .project-card p { color: var(--text-dim); font-size: 14.5px; line-height: 1.65; margin-bottom: 16px; }
  .stack-row { display: flex; flex-wrap: wrap; gap: 8px; }

  /* CERTIFICATIONS */
  .cert-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; margin-top: 50px; }
  @media (max-width: 900px) { .cert-grid { grid-template-columns: repeat(2, 1fr); } }
  @media (max-width: 560px) { .cert-grid { grid-template-columns: 1fr; } }
  .cert-item {
    background: var(--surface); border: 1px solid var(--line); border-radius: 10px;
    padding: 18px 20px; font-size: 13.6px; display: flex; gap: 12px; align-items: flex-start;
  }
  .cert-item .dot2 { width: 6px; height: 6px; border-radius: 50%; background: var(--amber); margin-top: 6px; flex-shrink: 0; }
  .cert-item b { display: block; margin-bottom: 2px; }
  .cert-item span { color: var(--text-dim); font-size: 12.3px; }

  .pub-callout {
    margin-top: 40px; border: 1px solid var(--line); border-radius: var(--radius);
    padding: 34px; background: var(--surface-2);
    display: flex; justify-content: space-between; gap: 30px; flex-wrap: wrap;
  }
  .pub-callout h4 { font-size: 18px; margin-bottom: 8px; }
  .pub-callout p { color: var(--text-dim); font-size: 14px; max-width: 480px; line-height: 1.6; }
  .pub-metrics { display: flex; gap: 30px; }
  .pub-metrics div { text-align: center; }
  .pub-metrics .n { font-family: 'Space Grotesk', sans-serif; font-size: 26px; font-weight: 700; color: var(--teal); }
  .pub-metrics .l { font-family: 'IBM Plex Mono', monospace; font-size: 10.5px; color: var(--text-dim); }

  /* CONTACT */
  .contact-block { text-align: center; padding: 130px 0; }
  .contact-block h2 { font-size: clamp(32px, 5.5vw, 56px); max-width: 760px; margin: 0 auto 24px; }
  .contact-links { display: flex; justify-content: center; gap: 16px; margin-top: 44px; flex-wrap: wrap; }
  .contact-links a {
    display: flex; align-items: center; gap: 8px;
    border: 1px solid var(--line); padding: 12px 20px; border-radius: 999px; font-size: 14px;
    transition: border-color .25s, transform .25s;
  }
  .contact-links a:hover { border-color: var(--amber); transform: translateY(-2px); }

  footer {
    border-top: 1px solid var(--line); padding: 30px 0; text-align: center;
    font-family: 'IBM Plex Mono', monospace; font-size: 12px; color: var(--text-dim);
  }

  /* loading */
  .loader {
    position: fixed; inset: 0; background: var(--ink); z-index: 1000;
    display: flex; align-items: center; justify-content: center;
    transition: opacity .6s ease, visibility .6s ease;
  }
  .loader.hide { opacity: 0; visibility: hidden; }
  .loader-mark { font-family: 'IBM Plex Mono', monospace; color: var(--amber); font-size: 14px; display:flex; gap:4px; align-items:center;}
  .loader-mark .bar { width: 3px; height: 18px; background: var(--teal); animation: load 1s ease-in-out infinite; }
  .loader-mark .bar:nth-child(2){ animation-delay: .12s; }
  .loader-mark .bar:nth-child(3){ animation-delay: .24s; }
  .loader-mark .bar:nth-child(4){ animation-delay: .36s; }
  @keyframes load { 0%,100%{ transform: scaleY(.4);} 50%{ transform: scaleY(1);} }
</style>
</head>
<body>
<div id="root"></div>

<script src="app.js"></script>
</body>
</html>
